<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 40" fill="white">
  <!-- Icon: square with mountain/house shape -->
  <g>
    <!-- Square background -->
    <rect x="0" y="2" width="36" height="36" rx="4" fill="white"/>
    <!-- Mountain shapes (teal on white square) -->
    <polygon points="18,8 28,24 8,24" fill="#00A9A5"/>
    <polygon points="12,16 20,28 4,28" fill="#00A9A5"/>
    <!-- Base line -->
    <rect x="4" y="28" width="28" height="2" rx="1" fill="#00A9A5"/>
  </g>
  <!-- Text: Tornalítica -->
  <text x="46" y="28" font-family="'Nunito Sans', 'Inter', -apple-system, sans-serif" font-size="24" font-weight="700" fill="white" letter-spacing="0.5">Tornalítica</text>
</svg>
